<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuitarVault — Songs & Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b08;
    --surface: #161410;
    --card: #1e1a14;
    --border: #2e2820;
    --accent: #c8922a;
    --accent2: #e8b84b;
    --text: #f0e8d8;
    --muted: #7a6e5e;
    --note-c: #e05a5a;
    --note-d: #e07a3a;
    --note-e: #c8922a;
    --note-f: #8cb840;
    --note-g: #4ab8a0;
    --note-a: #4a8ce0;
    --note-b: #9a6adc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(200,146,42,0.06) 0%, transparent 100%);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent2);
  }

  .logo span { color: var(--muted); font-weight: 400; font-size: 14px; display: block; letter-spacing: 3px; text-transform: uppercase; margin-top: -4px; }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .stat { text-align: right; }
  .stat-num { font-size: 22px; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }

  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 81px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .btn-add {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }

  .btn-add:hover { background: var(--accent2); }

  .search-box {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }

  .song-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .song-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .song-item:hover { background: rgba(200,146,42,0.06); }
  .song-item.active { background: rgba(200,146,42,0.12); border-left: 3px solid var(--accent); }

  .song-item-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .song-item-meta {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }

  .tag {
    background: var(--border);
    color: var(--accent);
    padding: 1px 6px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Main content area */
  .content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .content-header {
    padding: 24px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .song-title-display {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
  }

  .song-artist-display {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .content-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .btn.primary:hover { background: var(--accent2); }
  .btn.danger:hover { border-color: #e05a5a; color: #e05a5a; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 36px;
  }

  .tab {
    padding: 12px 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'IBM Plex Mono', monospace;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* Notes grid */
  .notes-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 16px;
    margin-top: 24px;
  }

  .notes-section-title:first-child { margin-top: 0; }

  .notes-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .note-pill {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 2px;
    cursor: default;
    position: relative;
    transition: transform 0.15s;
    user-select: none;
  }

  .note-pill:hover { transform: translateY(-2px); }

  .note-C { background: rgba(224,90,90,0.2); color: var(--note-c); border: 1px solid rgba(224,90,90,0.4); }
  .note-D { background: rgba(224,122,58,0.2); color: var(--note-d); border: 1px solid rgba(224,122,58,0.4); }
  .note-E { background: rgba(200,146,42,0.2); color: var(--note-e); border: 1px solid rgba(200,146,42,0.4); }
  .note-F { background: rgba(140,184,64,0.2); color: var(--note-f); border: 1px solid rgba(140,184,64,0.4); }
  .note-G { background: rgba(74,184,160,0.2); color: var(--note-g); border: 1px solid rgba(74,184,160,0.4); }
  .note-A { background: rgba(74,140,224,0.2); color: var(--note-a); border: 1px solid rgba(74,140,224,0.4); }
  .note-B { background: rgba(154,106,220,0.2); color: var(--note-b); border: 1px solid rgba(154,106,220,0.4); }

  /* Chord diagram area */
  .chord-sequence {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .chord-badge {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .chord-badge:hover { border-color: var(--accent); color: var(--accent); }

  /* Tablature display */
  .tab-display {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 2;
    color: var(--text);
    overflow-x: auto;
    white-space: pre;
    margin-bottom: 20px;
  }

  .tab-string-label { color: var(--accent); }

  /* Input form */
  .input-form {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .form-input, .form-select, .form-textarea {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 100px; }
  .form-select option { background: var(--card); }

  /* Note input area */
  .note-input-area {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px;
  }

  .note-keyboard {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .note-key {
    padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    border-radius: 2px;
  }

  .note-key-C { background: rgba(224,90,90,0.3); color: var(--note-c); }
  .note-key-D { background: rgba(224,122,58,0.3); color: var(--note-d); }
  .note-key-E { background: rgba(200,146,42,0.3); color: var(--note-e); }
  .note-key-F { background: rgba(140,184,64,0.3); color: var(--note-f); }
  .note-key-G { background: rgba(74,184,160,0.3); color: var(--note-g); }
  .note-key-A { background: rgba(74,140,224,0.3); color: var(--note-a); }
  .note-key-B { background: rgba(154,106,220,0.3); color: var(--note-b); }
  .note-key:hover { filter: brightness(1.4); transform: scale(1.05); }
  .note-key:active { transform: scale(0.97); }

  .note-preview {
    min-height: 36px;
    background: var(--surface);
    border: 1px dashed var(--border);
    padding: 8px 12px;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 10px;
  }

  .note-preview-item {
    padding: 2px 8px;
    font-weight: 600;
    border-radius: 2px;
    font-size: 12px;
  }

  .note-preview-empty { color: var(--muted); font-size: 11px; letter-spacing: 1px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--muted); }
  .empty-sub { font-size: 12px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 580px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 24px;
    color: var(--accent2);
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: none; border: none;
    color: var(--muted); font-size: 18px;
    cursor: pointer; transition: color 0.2s;
    font-family: monospace;
  }

  .modal-close:hover { color: var(--text); }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* Tuning display */
  .tuning-display {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .tuning-string {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .tuning-note {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 13px;
    border: 2px solid;
  }

  .tuning-num { font-size: 9px; color: var(--muted); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .hidden { display: none !important; }

  /* Fretboard visual */
  .fretboard {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 16px 20px;
    margin-bottom: 16px;
    overflow-x: auto;
  }

  .fretboard svg { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">
    GuitarVault
    <span>Songs &amp; Notes Library</span>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="totalSongs">0</div>
      <div class="stat-label">Songs</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="totalNotes">0</div>
      <div class="stat-label">Note Sets</div>
    </div>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Song Library</span>
      <button class="btn-add" onclick="openAddModal()">+ Add Song</button>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search songs or artists..." oninput="filterSongs()">
    </div>
    <div class="song-list" id="songList"></div>
  </div>

  <!-- Main Content -->
  <div class="content" id="mainContent">
    <div class="tab-content">
      <div class="empty-state">
        <div class="empty-icon">🎸</div>
        <div class="empty-title">Select a Song</div>
        <div class="empty-sub">Choose a song from the library or add a new one</div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Song Modal -->
<div class="modal-overlay" id="songModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Add New Song</div>

    <div class="input-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Song Title *</label>
          <input type="text" class="form-input" id="inputTitle" placeholder="e.g. Stairway to Heaven">
        </div>
        <div class="form-group">
          <label class="form-label">Artist *</label>
          <input type="text" class="form-input" id="inputArtist" placeholder="e.g. Led Zeppelin">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Genre</label>
          <select class="form-select" id="inputGenre">
            <option value="">— Select —</option>
            <option>Rock</option><option>Blues</option><option>Jazz</option>
            <option>Classical</option><option>Folk</option><option>Metal</option>
            <option>Pop</option><option>Country</option><option>Flamenco</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Key</label>
          <select class="form-select" id="inputKey">
            <option value="">— Select —</option>
            <option>C Major</option><option>G Major</option><option>D Major</option>
            <option>A Major</option><option>E Major</option><option>B Major</option>
            <option>F Major</option><option>A Minor</option><option>E Minor</option>
            <option>D Minor</option><option>B Minor</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Chords (comma-separated)</label>
        <input type="text" class="form-input" id="inputChords" placeholder="e.g. Am, F, C, G">
      </div>

      <div class="form-group">
        <label class="form-label">Notes Sequence — Click to build</label>
        <div class="note-input-area">
          <div class="note-keyboard">
            <button class="note-key note-key-C" onclick="addNote('C')">C</button>
            <button class="note-key note-key-C" onclick="addNote('C#')">C#</button>
            <button class="note-key note-key-D" onclick="addNote('D')">D</button>
            <button class="note-key note-key-D" onclick="addNote('D#')">D#</button>
            <button class="note-key note-key-E" onclick="addNote('E')">E</button>
            <button class="note-key note-key-F" onclick="addNote('F')">F</button>
            <button class="note-key note-key-F" onclick="addNote('F#')">F#</button>
            <button class="note-key note-key-G" onclick="addNote('G')">G</button>
            <button class="note-key note-key-G" onclick="addNote('G#')">G#</button>
            <button class="note-key note-key-A" onclick="addNote('A')">A</button>
            <button class="note-key note-key-A" onclick="addNote('A#')">A#</button>
            <button class="note-key note-key-B" onclick="addNote('B')">B</button>
          </div>
          <div class="note-preview" id="notePreview">
            <span class="note-preview-empty">Click notes above to build sequence...</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="removeLastNote()" style="font-size:10px;padding:5px 12px;">⌫ Undo</button>
            <button class="btn danger" onclick="clearNotes()" style="font-size:10px;padding:5px 12px;">Clear</button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tab / Notation (optional)</label>
        <textarea class="form-textarea" id="inputTab" placeholder="e|---0---2---3---|&#10;B|---1---3---1---|&#10;G|---0---2---0---|&#10;D|---2---0---2---|&#10;A|---2---0---3---|&#10;E|---0---2---3---|" style="min-height:130px;font-size:12px;line-height:1.8"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Notes / Observations</label>
        <textarea class="form-textarea" id="inputNotes" placeholder="Add any practice notes, difficulty, or personal observations..."></textarea>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveSong()" id="saveBtn">Save Song</button>
    </div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
let songs = JSON.parse(localStorage.getItem('guitarVault') || '[]');

// Seed data if empty
if (songs.length === 0) {
  songs = [
    {
      id: 1, title: "Wish You Were Here", artist: "Pink Floyd",
      genre: "Rock", key: "G Major",
      chords: ["G", "Em7", "A", "Em", "C"],
      notes: ["G", "G", "B", "D", "E", "G", "D", "B"],
      tab: `e|---0---3---0---0---|
B|---1---3---1---1---|
G|---0---0---0---2---|
D|---2---0---2---2---|
A|---3---2---3---0---|
E|---0---3---0---0---|`,
      personalNotes: "Capo 0. Iconic Pink Floyd track. Focus on smooth chord transitions between G and Em.",
    },
    {
      id: 2, title: "Hotel California", artist: "Eagles",
      genre: "Rock", key: "B Minor",
      chords: ["Bm", "F#", "A", "E", "G", "D", "Em", "F#"],
      notes: ["B", "D", "F#", "A", "E", "G", "D", "B"],
      tab: `e|---2---2---0---0---|
B|---3---2---2---0---|
G|---4---3---2---1---|
D|---4---4---2---2---|
A|---2---4---0---2---|
E|---2---2---0---0---|`,
      personalNotes: "Barre chords. The legendary outro solo is in B minor pentatonic.",
    },
    {
      id: 3, title: "Blackbird", artist: "The Beatles",
      genre: "Folk", key: "G Major",
      chords: ["G", "Am7", "G/B", "C", "A7", "D7"],
      notes: ["G", "A", "B", "C", "D", "E", "G"],
      tab: `e|---3---0---2---3---|
B|---3---1---3---3---|
G|---0---2---2---0---|
D|---0---2---0---0---|
A|---2---0---0---2---|
E|---3---0---0---3---|`,
      personalNotes: "Fingerpicking style. Paul McCartney wrote this in 1968. Use alternating bass-note technique.",
    },
  ];
  save();
}

let currentSongId = null;
let editingId = null;
let tempNotes = [];
let activeTab = 'overview';

function save() {
  localStorage.setItem('guitarVault', JSON.stringify(songs));
  updateStats();
}

function updateStats() {
  document.getElementById('totalSongs').textContent = songs.length;
  const totalNotes = songs.reduce((a, s) => a + (s.notes?.length || 0), 0);
  document.getElementById('totalNotes').textContent = totalNotes;
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar(filter = '') {
  const list = document.getElementById('songList');
  const filtered = songs.filter(s =>
    s.title.toLowerCase().includes(filter.toLowerCase()) ||
    s.artist.toLowerCase().includes(filter.toLowerCase())
  );

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">No songs found</div>`;
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="song-item ${s.id === currentSongId ? 'active' : ''}" onclick="selectSong(${s.id})">
      <div class="song-item-title">${s.title}</div>
      <div class="song-item-meta">
        <span>${s.artist}</span>
        ${s.genre ? `<span class="tag">${s.genre}</span>` : ''}
      </div>
    </div>
  `).join('');
}

function filterSongs() {
  renderSidebar(document.getElementById('searchInput').value);
}

// ─── Song view ────────────────────────────────────────────────────────────────
function selectSong(id) {
  currentSongId = id;
  activeTab = 'overview';
  renderSidebar(document.getElementById('searchInput').value);
  renderContent();
}

function getNoteClass(note) {
  const base = note.replace('#', '').replace('b', '');
  return `note-${base}`;
}

function renderContent() {
  const song = songs.find(s => s.id === currentSongId);
  if (!song) return;

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="content-header">
      <div>
        <div class="song-title-display">${song.title}</div>
        <div class="song-artist-display">— ${song.artist} ${song.key ? '· ' + song.key : ''}</div>
      </div>
      <div class="content-actions">
        <button class="btn" onclick="openEditModal(${song.id})">✎ Edit</button>
        <button class="btn danger" onclick="deleteSong(${song.id})">Delete</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${activeTab === 'overview' ? 'active' : ''}" onclick="switchTab('overview')">Overview</button>
      <button class="tab ${activeTab === 'notes' ? 'active' : ''}" onclick="switchTab('notes')">Notes</button>
      <button class="tab ${activeTab === 'tab' ? 'active' : ''}" onclick="switchTab('tab')">Tablature</button>
    </div>

    <div class="tab-content" id="tabContent">
      ${renderTabContent(song)}
    </div>
  `;
}

function renderTabContent(song) {
  if (activeTab === 'overview') {
    return `
      ${song.chords?.length ? `
        <div class="notes-section-title">Chord Progression</div>
        <div class="chord-sequence">
          ${song.chords.map(c => `<div class="chord-badge">${c}</div>`).join('')}
        </div>
      ` : ''}

      ${song.notes?.length ? `
        <div class="notes-section-title">Note Sequence</div>
        <div class="notes-grid">
          ${song.notes.map((n, i) => `
            <div class="note-pill ${getNoteClass(n)}" title="Note ${i+1}">${n}</div>
          `).join('')}
        </div>
      ` : ''}

      ${song.personalNotes ? `
        <div class="notes-section-title">Practice Notes</div>
        <div style="background:var(--card);border:1px solid var(--border);padding:16px 20px;font-size:13px;line-height:1.8;color:var(--text)">${song.personalNotes}</div>
      ` : ''}

      ${!song.chords?.length && !song.notes?.length && !song.personalNotes ? `
        <div style="color:var(--muted);font-size:13px;padding-top:10px">No data yet. Click Edit to add notes and chords.</div>
      ` : ''}
    `;
  }

  if (activeTab === 'notes') {
    return `
      <div class="notes-section-title">All Notes</div>
      ${song.notes?.length ? `
        <div class="notes-grid" style="margin-bottom:32px">
          ${song.notes.map((n, i) => `
            <div class="note-pill ${getNoteClass(n)}">${n} <span style="opacity:0.4;font-size:10px">${i+1}</span></div>
          `).join('')}
        </div>
        <div class="notes-section-title">Note Frequency</div>
        ${renderNoteFrequency(song.notes)}
      ` : '<div style="color:var(--muted);font-size:13px">No notes added yet.</div>'}
    `;
  }

  if (activeTab === 'tab') {
    return `
      <div class="notes-section-title">Guitar Tab</div>
      ${song.tab ? `<div class="tab-display">${escHtml(song.tab)}</div>` : '<div style="color:var(--muted);font-size:13px;margin-bottom:24px">No tablature added yet.</div>'}

      <div class="notes-section-title">Chords Reference</div>
      ${song.chords?.length ? `
        <div class="chord-sequence">
          ${song.chords.map(c => `<div class="chord-badge">${c}</div>`).join('')}
        </div>
      ` : '<div style="color:var(--muted);font-size:13px">No chords listed.</div>'}
    `;
  }

  return '';
}

function renderNoteFrequency(notes) {
  const freq = {};
  notes.forEach(n => { freq[n] = (freq[n] || 0) + 1; });
  const max = Math.max(...Object.values(freq));
  const noteColors = { C:'var(--note-c)', D:'var(--note-d)', E:'var(--note-e)', F:'var(--note-f)', G:'var(--note-g)', A:'var(--note-a)', B:'var(--note-b)' };

  return `<div style="display:flex;flex-direction:column;gap:8px;max-width:320px">
    ${Object.entries(freq).sort((a,b) => b[1]-a[1]).map(([n, count]) => {
      const base = n.replace('#','').replace('b','');
      const col = noteColors[base] || 'var(--accent)';
      const pct = Math.round((count / max) * 100);
      return `<div style="display:flex;align-items:center;gap:10px">
        <div style="width:28px;font-size:12px;font-weight:600;color:${col}">${n}</div>
        <div style="flex:1;height:8px;background:var(--border);position:relative">
          <div style="width:${pct}%;height:100%;background:${col};opacity:0.7;transition:width 0.5s"></div>
        </div>
        <div style="width:20px;font-size:11px;color:var(--muted);text-align:right">${count}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function switchTab(tab) {
  activeTab = tab;
  const song = songs.find(s => s.id === currentSongId);
  if (!song) return;
  renderContent();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  tempNotes = [];
  document.getElementById('modalTitle').textContent = 'Add New Song';
  document.getElementById('saveBtn').textContent = 'Save Song';
  ['inputTitle','inputArtist','inputChords','inputTab','inputNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inputGenre').value = '';
  document.getElementById('inputKey').value = '';
  updateNotePreview();
  document.getElementById('songModal').classList.add('open');
}

function openEditModal(id) {
  const song = songs.find(s => s.id === id);
  if (!song) return;
  editingId = id;
  tempNotes = [...(song.notes || [])];
  document.getElementById('modalTitle').textContent = 'Edit Song';
  document.getElementById('saveBtn').textContent = 'Update Song';
  document.getElementById('inputTitle').value = song.title || '';
  document.getElementById('inputArtist').value = song.artist || '';
  document.getElementById('inputChords').value = (song.chords || []).join(', ');
  document.getElementById('inputGenre').value = song.genre || '';
  document.getElementById('inputKey').value = song.key || '';
  document.getElementById('inputTab').value = song.tab || '';
  document.getElementById('inputNotes').value = song.personalNotes || '';
  updateNotePreview();
  document.getElementById('songModal').classList.add('open');
}

function closeModal() {
  document.getElementById('songModal').classList.remove('open');
  editingId = null;
  tempNotes = [];
}

function saveSong() {
  const title = document.getElementById('inputTitle').value.trim();
  const artist = document.getElementById('inputArtist').value.trim();
  if (!title || !artist) { alert('Song title and artist are required.'); return; }

  const chordsRaw = document.getElementById('inputChords').value;
  const chords = chordsRaw ? chordsRaw.split(',').map(c => c.trim()).filter(Boolean) : [];

  const songData = {
    title,
    artist,
    genre: document.getElementById('inputGenre').value,
    key: document.getElementById('inputKey').value,
    chords,
    notes: [...tempNotes],
    tab: document.getElementById('inputTab').value.trim(),
    personalNotes: document.getElementById('inputNotes').value.trim(),
  };

  if (editingId) {
    const idx = songs.findIndex(s => s.id === editingId);
    songs[idx] = { ...songs[idx], ...songData };
    currentSongId = editingId;
  } else {
    const newSong = { id: Date.now(), ...songData };
    songs.push(newSong);
    currentSongId = newSong.id;
  }

  save();
  closeModal();
  renderSidebar(document.getElementById('searchInput').value);
  renderContent();
}

function deleteSong(id) {
  if (!confirm('Delete this song? This cannot be undone.')) return;
  songs = songs.filter(s => s.id !== id);
  currentSongId = null;
  save();
  renderSidebar(document.getElementById('searchInput').value);
  document.getElementById('mainContent').innerHTML = `
    <div class="tab-content">
      <div class="empty-state">
        <div class="empty-icon">🎸</div>
        <div class="empty-title">Select a Song</div>
        <div class="empty-sub">Choose a song from the library or add a new one</div>
      </div>
    </div>`;
}

// ─── Note builder ─────────────────────────────────────────────────────────────
function addNote(note) {
  tempNotes.push(note);
  updateNotePreview();
}

function removeLastNote() {
  tempNotes.pop();
  updateNotePreview();
}

function clearNotes() {
  tempNotes = [];
  updateNotePreview();
}

function updateNotePreview() {
  const preview = document.getElementById('notePreview');
  if (!preview) return;
  if (tempNotes.length === 0) {
    preview.innerHTML = '<span class="note-preview-empty">Click notes above to build sequence...</span>';
    return;
  }
  const noteColors = { C:'var(--note-c)', D:'var(--note-d)', E:'var(--note-e)', F:'var(--note-f)', G:'var(--note-g)', A:'var(--note-a)', B:'var(--note-b)' };
  preview.innerHTML = tempNotes.map(n => {
    const base = n.replace('#','');
    const col = noteColors[base[0]] || 'var(--accent)';
    return `<span class="note-preview-item" style="background:${col}22;color:${col};border:1px solid ${col}55">${n}</span>`;
  }).join('');
}

// Close modal on overlay click
document.getElementById('songModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
updateStats();
renderSidebar();
</script>
</body>
</html>
